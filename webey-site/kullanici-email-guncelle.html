<!doctype html>
<html lang="tr">
<head>
  <link rel="icon" href="img/favicon.ico" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Kullanıcı E-posta Güncelle</title>
  <style>
    :root{--bg:#f4f3ef;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--brand:#0ea5b3;--brand-d:#0b8a96;--ok:#16a34a;--err:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(500px,100%);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;font-size:24px} p{margin:0;color:var(--muted);line-height:1.5}
    .row{margin-top:16px}.label{display:block;margin-bottom:6px;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.03em;text-transform:uppercase}
    input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px}
    .current{padding:11px 12px;border:1px solid var(--line);background:#f8fafc;border-radius:10px;font-weight:600}
    .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    button,a{border:0;border-radius:10px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .pri{background:var(--brand);color:#fff}.pri:hover{background:var(--brand-d)} .sec{background:#fff;color:#334155;border:1px solid var(--line)}
    .msg{display:none;margin-top:14px;padding:10px 12px;border-radius:10px;font-size:14px}
    .msg.ok{display:block;background:#ecfdf3;color:var(--ok);border:1px solid #bbf7d0}
    .msg.err{display:block;background:#fef2f2;color:var(--err);border:1px solid #fecaca}
    .state{display:none}.state.show{display:block}
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <section id="stepEmail" class="state show">
        <h1>E-posta Güncelle</h1>
        <p>Yeni e-posta, kod doğrulanmadan kaydedilmez.</p>

        <div class="row">
          <span class="label">Mevcut E-posta</span>
          <div id="currentEmail" class="current">Yükleniyor...</div>
        </div>

        <div class="row">
          <label class="label" for="newEmail">Yeni E-posta</label>
          <input id="newEmail" type="email" placeholder="ornek@site.com" autocomplete="email" />
        </div>

        <div class="actions">
          <button id="sendCodeBtn" class="pri" type="button">Doğrulama Kodu Gönder</button>
          <a class="sec" href="user-profile.html">Profile Dön</a>
        </div>
        <div id="msg1" class="msg"></div>
      </section>

      <section id="stepCode" class="state">
        <h1>Kod Doğrula</h1>
        <p id="codeInfo">E-postana gelen 6 haneli kodu gir.</p>

        <div class="row">
          <label class="label" for="otpCode">Doğrulama Kodu</label>
          <input id="otpCode" type="text" inputmode="numeric" maxlength="6" placeholder="123456" />
        </div>

        <div class="actions">
          <button id="verifySaveBtn" class="pri" type="button">Doğrula ve Kaydet</button>
          <button id="backBtn" class="sec" type="button">Geri</button>
        </div>
        <div id="msg2" class="msg"></div>
      </section>
    </main>
  </div>

  <script src="js/wb-api-shim.js"></script>
  <script>
    let currentEmail = '';
    let pendingEmail = '';

    function showState(id){
      document.querySelectorAll('.state').forEach((el)=>el.classList.remove('show'));
      document.getElementById(id).classList.add('show');
    }
    function setMsg(id, text, type){
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + (type === 'ok' ? 'ok' : 'err');
    }

    async function boot(){
      try {
        const me = await window.WbApi.get('/api/session/me.php');
        if (!me?.ok || me?.data?.role !== 'user') { location.replace('index.html'); return; }
        currentEmail = (me?.data?.email || '').toLowerCase();
        document.getElementById('currentEmail').textContent = currentEmail || '-';
      } catch {
        location.replace('index.html');
      }
    }

    async function sendCode(){
      const btn = document.getElementById('sendCodeBtn');
      const email = (document.getElementById('newEmail').value || '').trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setMsg('msg1', 'Geçerli bir e-posta adresi girin.', 'err');
      if (email === currentEmail) return setMsg('msg1', 'Bu zaten mevcut e-posta adresiniz.', 'err');

      btn.disabled = true;
      btn.textContent = 'Gönderiliyor...';
      try {
        const res = await window.WbApi.post('/api/auth/email-send-otp.php', { email, purpose: 'email_verify' });
        if (!res?.ok) throw new Error(res?.error || 'Kod gönderilemedi.');
        pendingEmail = email;
        document.getElementById('codeInfo').textContent = email + ' adresine gelen 6 haneli kodu gir.';
        document.getElementById('otpCode').value = '';
        showState('stepCode');
      } catch (e) {
        setMsg('msg1', e.message || 'Bağlantı hatası.', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Doğrulama Kodu Gönder';
      }
    }

    async function verifyAndSave(){
      const btn = document.getElementById('verifySaveBtn');
      const code = (document.getElementById('otpCode').value || '').trim();
      if (!pendingEmail) return setMsg('msg2', 'Önce doğrulama kodu gönder.', 'err');
      if (!/^\d{6}$/.test(code)) return setMsg('msg2', '6 haneli kodu girin.', 'err');

      btn.disabled = true;
      btn.textContent = 'Doğrulanıyor...';
      try {
        const verifyRes = await window.WbApi.post('/api/auth/email-verify-otp.php', {
          email: pendingEmail,
          code,
          purpose: 'email_verify'
        });
        if (!verifyRes?.ok) throw new Error(verifyRes?.error || 'Kod doğrulanamadı.');

        const saveRes = await window.WbApi.post('/api/user/profile/update.php', {
          action: 'update_email',
          email: pendingEmail
        });
        if (!saveRes?.ok) throw new Error(saveRes?.error || 'E-posta güncellenemedi.');

        setMsg('msg2', 'E-posta başarıyla doğrulandı ve güncellendi.', 'ok');
        localStorage.setItem('wb_profile_refresh', String(Date.now()));
        setTimeout(() => { location.href = 'user-profile.html'; }, 700);
      } catch (e) {
        setMsg('msg2', e.message || 'İşlem başarısız.', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Doğrula ve Kaydet';
      }
    }

    document.getElementById('sendCodeBtn').addEventListener('click', sendCode);
    document.getElementById('verifySaveBtn').addEventListener('click', verifyAndSave);
    document.getElementById('backBtn').addEventListener('click', ()=>showState('stepEmail'));
    document.getElementById('otpCode').addEventListener('input', (e)=>{ e.target.value = e.target.value.replace(/\D/g, '').slice(0,6); });

    boot();
  </script>
</body>
</html>
