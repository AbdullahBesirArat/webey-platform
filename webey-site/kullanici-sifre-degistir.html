<!doctype html>
<html lang="tr">
<head>
  <link rel='icon' href='img/favicon.ico' />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Kullanıcı Şifre Değiştir</title>
  <style>
    :root{--bg:#f4f3ef;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--brand:#0ea5b3;--brand-d:#0b8a96;--ok:#16a34a;--err:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(560px,100%);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;font-size:24px} p{margin:0;color:var(--muted);line-height:1.5}
    .row{margin-top:16px}.label{display:block;margin-bottom:6px;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.03em;text-transform:uppercase}
    input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px}
    .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    button,a{border:0;border-radius:10px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .pri{background:var(--brand);color:#fff}.pri:hover{background:var(--brand-d)} .sec{background:#fff;color:#334155;border:1px solid var(--line)}
    .msg{display:none;margin-top:14px;padding:10px 12px;border-radius:10px;font-size:14px}
    .msg.ok{display:block;background:#ecfdf3;color:var(--ok);border:1px solid #bbf7d0}
    .msg.err{display:block;background:#fef2f2;color:var(--err);border:1px solid #fecaca}
    .choice{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .choice button{background:#fff;border:1px solid var(--line);color:#0f172a}
    .choice button.active{border-color:var(--brand);color:var(--brand)}
    .state{display:none}.state.show{display:block}
    .muted{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <h1>Şifre İşlemleri</h1>
      <p>Mevcut şifreni biliyorsan direkt değiştir, bilmiyorsan e-posta kodu ile sıfırla.</p>

      <div class="choice">
        <button id="tabKnown" class="active" type="button">Mevcut Şifremi Biliyorum</button>
        <button id="tabForgot" type="button">Şifremi Unuttum</button>
      </div>

      <section id="knownState" class="state show">
        <div class="row">
          <label class="label" for="curPw">Mevcut Şifre</label>
          <input id="curPw" type="password" autocomplete="current-password" />
        </div>
        <div class="row">
          <label class="label" for="newPw">Yeni Şifre</label>
          <input id="newPw" type="password" autocomplete="new-password" />
        </div>
        <div class="row">
          <label class="label" for="newPw2">Yeni Şifre (Tekrar)</label>
          <input id="newPw2" type="password" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button id="saveKnownBtn" class="pri" type="button">Şifreyi Güncelle</button>
          <a class="sec" href="user-profile.html">Profile Dön</a>
        </div>
        <div id="knownMsg" class="msg"></div>
      </section>

      <section id="forgotState" class="state">
        <div id="forgotStep1" class="state show">
          <div class="row">
            <span class="label">Kayıtlı E-posta</span>
            <input id="forgotEmail" type="email" disabled />
          </div>
          <div class="actions">
            <button id="sendForgotOtpBtn" class="pri" type="button">Doğrulama Kodu Gönder</button>
            <a class="sec" href="user-profile.html">Profile Dön</a>
          </div>
          <div id="forgotMsg1" class="msg"></div>
        </div>

        <div id="forgotStep2" class="state">
          <div class="row">
            <label class="label" for="forgotOtp">E-posta Kodu</label>
            <input id="forgotOtp" type="text" inputmode="numeric" maxlength="6" placeholder="123456" />
            <div class="muted">Kodu doğrulayınca yeni şifre alanları açılır.</div>
          </div>
          <div class="actions">
            <button id="verifyForgotOtpBtn" class="pri" type="button">Kodu Doğrula</button>
            <button id="backForgotBtn" class="sec" type="button">Geri</button>
          </div>
          <div id="forgotMsg2" class="msg"></div>
        </div>

        <div id="forgotStep3" class="state">
          <div class="row">
            <label class="label" for="forgotNewPw">Yeni Şifre</label>
            <input id="forgotNewPw" type="password" autocomplete="new-password" />
          </div>
          <div class="row">
            <label class="label" for="forgotNewPw2">Yeni Şifre (Tekrar)</label>
            <input id="forgotNewPw2" type="password" autocomplete="new-password" />
          </div>
          <div class="actions">
            <button id="saveForgotBtn" class="pri" type="button">Yeni Şifreyi Kaydet</button>
            <button id="restartForgotBtn" class="sec" type="button">Başa Dön</button>
          </div>
          <div id="forgotMsg3" class="msg"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/wb-api-shim.js"></script>
  <script>
    let accountEmail = '';

    function setMsg(id, text, type){
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + (type === 'ok' ? 'ok' : 'err');
    }
    function clearMsg(id){
      const el = document.getElementById(id);
      el.className = 'msg';
      el.textContent = '';
    }
    function setMode(mode){
      const known = mode === 'known';
      document.getElementById('tabKnown').classList.toggle('active', known);
      document.getElementById('tabForgot').classList.toggle('active', !known);
      document.getElementById('knownState').classList.toggle('show', known);
      document.getElementById('forgotState').classList.toggle('show', !known);
    }
    function setForgotStep(step){
      ['forgotStep1','forgotStep2','forgotStep3'].forEach((id)=>{
        document.getElementById(id).classList.toggle('show', id === step);
      });
      clearMsg('forgotMsg1'); clearMsg('forgotMsg2'); clearMsg('forgotMsg3');
    }
    function strongEnough(pw){
      return pw.length >= 8 && /[A-Za-z]/.test(pw) && /\d/.test(pw);
    }

    async function boot(){
      try {
        const me = await window.WbApi.get('/api/session/me.php');
        if (!me?.ok || me?.data?.role !== 'user') { location.replace('index.html'); return; }
        accountEmail = (me?.data?.email || '').toLowerCase();
        document.getElementById('forgotEmail').value = accountEmail || 'Kayıtlı e-posta yok';
      } catch {
        location.replace('index.html');
      }
    }

    async function saveKnown(){
      const btn = document.getElementById('saveKnownBtn');
      const cur = document.getElementById('curPw').value || '';
      const n1 = document.getElementById('newPw').value || '';
      const n2 = document.getElementById('newPw2').value || '';

      if (!cur || !n1 || !n2) return setMsg('knownMsg', 'Tüm alanları doldurun.', 'err');
      if (!strongEnough(n1)) return setMsg('knownMsg', 'Yeni şifre en az 8 karakter olmalı, harf ve rakam içermeli.', 'err');
      if (n1 !== n2) return setMsg('knownMsg', 'Yeni şifreler eşleşmiyor.', 'err');

      btn.disabled = true; btn.textContent = 'Kaydediliyor...';
      try {
        const res = await window.WbApi.post('/api/user/profile/update.php', {
          action: 'change_password',
          currentPassword: cur,
          newPassword: n1
        });
        if (!res?.ok) throw new Error(res?.error || 'Şifre değiştirilemedi.');
        setMsg('knownMsg', 'Şifre başarıyla güncellendi.', 'ok');
        localStorage.setItem('wb_profile_refresh', String(Date.now()));
      } catch (e) {
        setMsg('knownMsg', e.message || 'Bağlantı hatası.', 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Şifreyi Güncelle';
      }
    }

    async function sendForgotOtp(){
      const btn = document.getElementById('sendForgotOtpBtn');
      if (!accountEmail) return setMsg('forgotMsg1', 'Önce hesap e-postası eklemelisiniz.', 'err');
      btn.disabled = true; btn.textContent = 'Gönderiliyor...';
      try {
        const res = await window.WbApi.post('/api/auth/email-send-otp.php', {
          email: accountEmail,
          purpose: 'password_reset'
        });
        if (!res?.ok) throw new Error(res?.error || 'Kod gönderilemedi.');
        setForgotStep('forgotStep2');
      } catch (e) {
        setMsg('forgotMsg1', e.message || 'Bağlantı hatası.', 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Doğrulama Kodu Gönder';
      }
    }

    async function verifyForgotOtp(){
      const btn = document.getElementById('verifyForgotOtpBtn');
      const code = (document.getElementById('forgotOtp').value || '').trim();
      if (!/^\d{6}$/.test(code)) return setMsg('forgotMsg2', '6 haneli kodu girin.', 'err');
      btn.disabled = true; btn.textContent = 'Doğrulanıyor...';
      try {
        const res = await window.WbApi.post('/api/auth/email-verify-otp.php', {
          email: accountEmail,
          code,
          purpose: 'password_reset'
        });
        if (!res?.ok) throw new Error(res?.error || 'Kod doğrulanamadı.');
        setForgotStep('forgotStep3');
      } catch (e) {
        setMsg('forgotMsg2', e.message || 'Kod doğrulanamadı.', 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Kodu Doğrula';
      }
    }

    async function saveForgotPassword(){
      const btn = document.getElementById('saveForgotBtn');
      const n1 = document.getElementById('forgotNewPw').value || '';
      const n2 = document.getElementById('forgotNewPw2').value || '';
      if (!strongEnough(n1)) return setMsg('forgotMsg3', 'Yeni şifre en az 8 karakter olmalı, harf ve rakam içermeli.', 'err');
      if (n1 !== n2) return setMsg('forgotMsg3', 'Yeni şifreler eşleşmiyor.', 'err');

      btn.disabled = true; btn.textContent = 'Kaydediliyor...';
      try {
        const res = await window.WbApi.post('/api/user/profile/update.php', {
          action: 'change_password_with_email_otp',
          email: accountEmail,
          newPassword: n1,
          confirmPassword: n2
        });
        if (!res?.ok) throw new Error(res?.error || 'Şifre güncellenemedi.');
        setMsg('forgotMsg3', 'Şifre başarıyla güncellendi.', 'ok');
        localStorage.setItem('wb_profile_refresh', String(Date.now()));
        setTimeout(() => { location.href = 'user-profile.html'; }, 700);
      } catch (e) {
        setMsg('forgotMsg3', e.message || 'Bağlantı hatası.', 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Yeni Şifreyi Kaydet';
      }
    }

    document.getElementById('tabKnown').addEventListener('click', ()=>setMode('known'));
    document.getElementById('tabForgot').addEventListener('click', ()=>setMode('forgot'));
    document.getElementById('saveKnownBtn').addEventListener('click', saveKnown);
    document.getElementById('sendForgotOtpBtn').addEventListener('click', sendForgotOtp);
    document.getElementById('verifyForgotOtpBtn').addEventListener('click', verifyForgotOtp);
    document.getElementById('saveForgotBtn').addEventListener('click', saveForgotPassword);
    document.getElementById('backForgotBtn').addEventListener('click', ()=>setForgotStep('forgotStep1'));
    document.getElementById('restartForgotBtn').addEventListener('click', ()=>setForgotStep('forgotStep1'));
    document.getElementById('forgotOtp').addEventListener('input', (e)=>{ e.target.value = e.target.value.replace(/\D/g, '').slice(0,6); });

    boot();
  </script>
</body>
</html>
