<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel='icon' href='img/favicon.ico' />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildirimler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="css/wb-bottom-nav.css">
<link rel="stylesheet" href="css/admin-wb.css">
<style>
body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#f0f2f7;color:#111827}.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 3px rgba(0,0,0,.06);z-index:100}.topbar__inner{max-width:1280px;margin:0 auto;height:56px;padding:0 24px;display:flex;align-items:center;gap:12px}.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:#111827;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}.topbar .logo svg{flex-shrink:0}.topbar__badge{background:#eef2ff;color:#4f46e5;border:1px solid #c7d2fe;border-radius:999px;font-size:11px;font-weight:700;padding:2px 8px;white-space:nowrap}.spacer{flex:1}.page{max-width:1100px;margin:0 auto;padding:28px 24px 96px}.header{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}.header h1{margin:0 0 6px;font-size:28px;display:flex;align-items:center;gap:10px}.header p{margin:0;color:#6b7280;font-size:13px}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.live{padding:6px 12px;border-radius:999px;background:#ecfdf5;color:#10b981;font-size:12px;font-weight:700}.markall{border:none;background:#0ea5b3;color:#fff;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07)}.stat strong{display:block;font-size:30px}.stat span{font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:700}.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}.chip{border:none;border-radius:999px;background:#fff;padding:8px 14px;font-weight:700;color:#6b7280;cursor:pointer}.chip.active{background:#0ea5b3;color:#fff}.search{margin-left:auto;background:#fff;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(0,0,0,.07)}.search input{border:none;outline:none;background:none}.list{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:16px;border-left:4px solid #0ea5b3}.card.read{opacity:.64}.card-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}.badge-guide,.badge-booking{background:rgba(14,165,179,.1);color:#0b8a96}.badge-cancel{background:#fffbeb;color:#92400e}.badge-done{background:#f3f4f6;color:#374151}.title{font-size:16px;font-weight:800;margin:0 0 6px}.meta,.msg{font-size:13px;color:#6b7280}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}.btn{border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer;text-decoration:none}.btn-primary{background:#0ea5b3;color:#fff;text-decoration:none}.btn-success{background:#10b981;color:#fff}.btn-danger{background:#fef2f2;color:#ef4444}.btn-ghost{background:#f3f4f6;color:#374151}.empty,.loading{text-align:center;padding:64px 16px;color:#6b7280}.wb-bottom-nav{position:fixed;left:0;right:0;bottom:0}@media (max-width:768px){.topbar__inner{padding:0 16px}.topbar__badge{display:none}.page{padding:20px 16px 96px}.stats{grid-template-columns:repeat(2,1fr)}.search{width:100%;margin-left:0}.search input{width:100%}}
</style>
</head>
<body>
<div id="rail-mount" aria-hidden="true"></div>
<header class="topbar"><div class="topbar__inner"><a id="brandName" class="logo" href="#" aria-label="İşletme adı"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span id="brandNameText"></span></a><span class="topbar__badge">Bildirimler</span><div class="spacer"></div></div></header>
<main class="page">
<div class="header"><div><h1><span class="material-symbols-rounded" style="color:#0ea5b3">notifications</span>Bildirim Merkezi</h1><p>Randevu ve iptal bildirimleri burada saklanır. Her 30 saniyede otomatik güncellenir.</p></div><div class="actions"><span class="live">Canlı</span><button id="btnMarkAllRead" class="markall" type="button">Tümünü Oku</button></div></div>
<div class="stats"><div class="stat"><strong id="statAll">0</strong><span>Tüm Bildirimler</span></div><div class="stat"><strong id="statUnread">0</strong><span>Okunmamış</span></div><div class="stat"><strong id="statBooking">0</strong><span>Yeni Randevular</span></div><div class="stat"><strong id="statCancel">0</strong><span>İptal Talepleri</span></div></div>
<div class="filters"><button class="chip active" data-tab="all">Tümü</button><button class="chip" data-tab="unread">Okunmamış</button><button class="chip" data-tab="booking">Randevu</button><button class="chip" data-tab="cancellation">İptal</button><label class="search"><span class="material-symbols-rounded">search</span><input id="search" type="text" placeholder="Müşteri ara..."></label></div>
<div id="list" class="list"><div class="loading">Yükleniyor...</div></div>
</main>
<nav class="wb-bottom-nav" id="adminBottomNav" aria-label="Admin menü" role="navigation"><div class="wb-bn-inner"><a class="wb-bn-item" href="staff.html" aria-label="Personel"><span class="wb-bn-icon material-symbols-rounded">group</span><span class="wb-bn-label">Personel</span></a><a class="wb-bn-item" href="settings.html" aria-label="Dükkan"><span class="wb-bn-icon material-symbols-rounded">store</span><span class="wb-bn-label">Dükkan</span></a><a class="wb-bn-item wb-bn-cta" href="calendar.html" aria-label="Takvim"><div class="wb-bn-cta-bubble"><span class="wb-bn-icon material-symbols-rounded">calendar_month</span></div><span class="wb-bn-label">Takvim</span></a><a class="wb-bn-item is-active" href="bildirimler.html" aria-current="page" aria-label="Bildirimler"><span class="wb-bn-icon material-symbols-rounded">notifications</span><span class="wb-bn-label">Bildirim</span></a><a class="wb-bn-item" href="admin-profile.html" aria-label="Profil"><span class="wb-bn-icon material-symbols-rounded">account_circle</span><span class="wb-bn-label">Profil</span></a></div></nav>
<script>
(function loadRail(){const m=document.getElementById('rail-mount');if(!m)return;const C=['bar-menu.html','/bar-menu.html','../bar-menu.html'];async function t(u){try{const r=await fetch(u,{credentials:'same-origin'});if(!r.ok)throw 0;m.innerHTML=await r.text();m.removeAttribute('aria-hidden');document.body.classList.add('has-app-bar');m.querySelectorAll('.rail__btn,nav a').forEach(a=>{const h=(a.getAttribute('href')||'').split(/[?#]/)[0];if(/(^|\/)bildirimler\.html$/i.test(h))a.setAttribute('aria-current','page');});m.querySelectorAll('.app-bar__item').forEach(el=>{if(el.getAttribute('data-page')==='bildirimler')el.classList.add('app-bar__item--active');});return true}catch{return false}}(async()=>{for(const u of C){if(await t(u))return}})()})();
</script>
<script src="js/wb-api-shim.js"></script>
<script src="js/wb-email-banner.js" defer></script>
<script src="js/wb-transitions.js" defer></script>
<script src="js/wb-notifications.js"></script>
<script>
(function(){'use strict';const APP_BASE=location.pathname.startsWith('/webey/')?'/webey':'';const ap=u=>(APP_BASE&&String(u||'').startsWith('/'))?(APP_BASE+u):u;let items=[];let tab='all';let q='';let csrf=null;const listEl=document.getElementById('list');function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function fmtDT(v){if(!v)return '';const d=new Date(String(v).replace(' ','T'));if(isNaN(d))return String(v);const n=new Date();const diff=Math.floor((n-d)/1000);if(diff<60)return 'Az önce';if(diff<3600)return Math.floor(diff/60)+' dk önce';if(diff<86400)return Math.floor(diff/3600)+' sa önce';const p=x=>String(x).padStart(2,'0');return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes())}async function api(url,o){const r=await fetch(ap(url),{credentials:'same-origin',...(o||{})});if(r.status===401){location.href=(APP_BASE?APP_BASE+'/':'')+'admin-register-login.html';return null;}return r.json()}async function getCsrf(){if(csrf)return csrf;const r=await api('/api/csrf.php');if(r?.ok)csrf=r.data?.token||r.csrf_token||null;return csrf}async function post(url,body){const t=await getCsrf();return api(url,{method:'POST',headers:{'Content-Type':'application/json',...(t?{'X-CSRF-Token':t}:{})},body:JSON.stringify(body||{})})}function filtered(){let out=items.slice();if(tab==='unread')out=out.filter(x=>!x.isRead);if(tab==='booking')out=out.filter(x=>x.type==='booking');if(tab==='cancellation')out=out.filter(x=>x.type==='cancellation');if(q){const s=q.toLowerCase();out=out.filter(x=>[x.customerName,x.customerPhone,x.serviceName,x.title,x.message].some(v=>String(v||'').toLowerCase().includes(s)))}return out}function setCounts(){document.getElementById('statAll').textContent=String(items.length);document.getElementById('statUnread').textContent=String(items.filter(x=>!x.isRead).length);document.getElementById('statBooking').textContent=String(items.filter(x=>x.type==='booking').length);document.getElementById('statCancel').textContent=String(items.filter(x=>x.type==='cancellation').length);if(window.wbNotifications?.applyBellCount)window.wbNotifications.applyBellCount(items.filter(x=>!x.isRead).length)}function badge(x){if(x.type==='guide')return '<span class="badge badge-guide">Bilgilendirme</span>';if(x.type==='booking'&&x.result==='pending')return '<span class="badge badge-booking">Yeni Randevu</span>';if(x.type==='cancellation'&&x.result==='pending')return '<span class="badge badge-cancel">İptal Talebi</span>';if(x.result==='approved')return '<span class="badge badge-done">Onaylandı</span>';if(x.result==='rejected')return '<span class="badge badge-done">Reddedildi</span>';if(x.result==='cancel_approved')return '<span class="badge badge-done">İptal Onaylandı</span>';if(x.result==='cancel_rejected')return '<span class="badge badge-done">İptal Reddedildi</span>';return '<span class="badge badge-done">Sistem</span>'}function card(x){const title=esc(x.title||x.customerName||'Bildirim');const msg=esc(x.message||x.serviceName||'');const meta=[x.customerPhone?esc(x.customerPhone):'',x.staffName?esc(x.staffName):'',x.startFmt?esc(x.startFmt):''].filter(Boolean).join(' · ');let actions='';if(x.type==='guide'){actions='<a class="btn btn-primary" href="'+esc(x.linkUrl||'bildirimler.html')+'">Sayfayı Aç</a>'}else if(x.result==='pending'&&x.type==='booking'){actions='<button class="btn btn-success" data-action="approve" data-appt="'+esc(x.appointmentId||'')+'" data-id="'+esc(x.id)+'">Onayla</button><button class="btn btn-danger" data-action="reject" data-appt="'+esc(x.appointmentId||'')+'" data-id="'+esc(x.id)+'">Reddet</button>'}else if(x.result==='pending'&&x.type==='cancellation'){actions='<button class="btn btn-success" data-action="approve-cancel" data-appt="'+esc(x.appointmentId||'')+'" data-id="'+esc(x.id)+'">İptali Onayla</button><button class="btn btn-danger" data-action="reject-cancel" data-appt="'+esc(x.appointmentId||'')+'" data-id="'+esc(x.id)+'">Reddet</button>'}return '<article class="card '+(x.isRead?'read ':'')+(x.type==='cancellation'?'type-cancel ':'')+'"><div class="card-top"><div>'+badge(x)+(x.isRead?'':' <span class="badge badge-booking" style="background:#eef2ff;color:#6366f1">Yeni</span>')+'</div><span class="meta">'+fmtDT(x.createdAt)+'</span></div><div class="title">'+title+'</div><div class="msg">'+msg+'</div>'+(meta?'<div class="meta" style="margin-top:6px">'+meta+'</div>':'')+'<div class="row">'+actions+'<button class="btn btn-ghost" data-action="delete" data-id="'+esc(x.id)+'">Sil</button></div></article>'}function bindActions(){listEl.querySelectorAll('[data-action]').forEach(btn=>{btn.addEventListener('click',async()=>{const action=btn.dataset.action;const id=Number(btn.dataset.id);const appt=btn.dataset.appt;btn.disabled=true;if(action==='delete'){const r=await post('/api/notifications/delete.php',{id});if(r?.ok){items=items.filter(x=>String(x.id)!==String(id));render()}else btn.disabled=false;return}if(action==='approve'){const r=await post('/api/calendar/update-appointment.php',{id:appt,status:'approved'});if(r?.ok)await reload();else btn.disabled=false;return}if(action==='reject'){const r=await post('/api/calendar/update-appointment.php',{id:appt,status:'cancelled'});if(r?.ok)await reload();else btn.disabled=false;return}if(action==='approve-cancel'){const r=await post('/api/calendar/approve-cancellation.php',{id:appt});if(r?.ok)await reload();else btn.disabled=false;return}if(action==='reject-cancel'){const r=await post('/api/calendar/reject-cancellation.php',{id:appt});if(r?.ok)await reload();else btn.disabled=false;}})})}function render(){setCounts();const rows=filtered();if(!rows.length){listEl.innerHTML='<div class="empty">Bu bölümde gösterilecek bildirim bulunamadı.</div>';return}listEl.innerHTML=rows.map(card).join('');bindActions()}async function reload(){const res=await api('/api/notifications/list.php?limit=500');if(res?.ok){items=res.data?.items||res.data?.notifications||[];render()}else{listEl.innerHTML='<div class="empty">Bildirimler şu anda getirilemedi.</div>'}}document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));chip.classList.add('active');tab=chip.dataset.tab;render()}));document.getElementById('search').addEventListener('input',e=>{q=e.target.value.trim();render()});document.getElementById('btnMarkAllRead').addEventListener('click',async()=>{await post('/api/notifications/mark-all-read.php',{});items=items.map(x=>({...x,isRead:true}));render()});window.addEventListener('wb:notif-action',reload);(async()=>{const sess=await api('/api/session/me.php');if(!sess?.ok||sess?.data?.role!=='admin'){location.href=(APP_BASE?APP_BASE+'/':'')+'admin-register-login.html';return;}if(sess.data.businessName){document.getElementById('brandNameText').textContent=sess.data.businessName}await reload();setInterval(reload,30000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)reload()})})();})();
</script>
</body>
</html>
