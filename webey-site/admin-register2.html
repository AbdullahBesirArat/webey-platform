<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel='icon' href='img/favicon.ico' />
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="robots" content="noindex,nofollow"/><meta name="theme-color" content="#07080d"/>
  <title>Adım 2 – Profil Bilgileri | Webey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <style>
    :root{--bg:#07080d;--bg2:#0d0f17;--bg3:#111420;--teal:#0ea5b3;--teal-d:#0b8a96;--teal-g:rgba(14,165,179,.35);--teal-s:rgba(14,165,179,.10);--ink:#fff;--ink2:rgba(255,255,255,.68);--ink3:rgba(255,255,255,.40);--border:rgba(255,255,255,.08);--border-t:rgba(14,165,179,.22);--on:#22c55e;--danger:#ef4444;--danger-s:rgba(239,68,68,.12);--warn:#f59e0b;--input-bg:rgba(255,255,255,.04);--radius:20px;--radius-sm:12px;--shadow:0 0 0 1px var(--border-t),0 32px 80px rgba(0,0,0,.6);--ring:rgba(14,165,179,.3);}
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;min-height:100dvh;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:clamp(16px,3vw,28px) clamp(12px,4vw,20px);padding-top:calc(env(safe-area-inset-top,0px) + 16px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 32px);-webkit-font-smoothing:antialiased;}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(14,165,179,.12),transparent 65%);}
    .page-logo{display:block;text-align:center;margin-bottom:20px;font-family:'DM Serif Display',serif;font-style:italic;font-size:26px;color:#fff;text-decoration:none;position:relative;z-index:1;}.page-logo em{color:var(--teal);font-style:normal;}
    .sn{width:min(560px,100%);margin:0 auto 20px;display:flex;align-items:flex-start;position:relative;z-index:1;}
    .sn-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;}
    .sn-line{flex:1 1 0;height:2px;background:var(--border);margin-top:14px;border-radius:2px;min-width:6px;transition:background .35s;}.sn-line.done{background:var(--on);}
    .sn-bubble{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink3);transition:all .3s;}
    .sn-item.done .sn-bubble{background:var(--on);border-color:var(--on);color:#fff;}
    .sn-item.active .sn-bubble{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 0 0 4px var(--teal-s);}
    .sn-label{font-size:9.5px;font-weight:700;color:var(--ink3);letter-spacing:.05em;text-align:center;white-space:nowrap;text-transform:uppercase;line-height:1;}
    .sn-item.done .sn-label,.sn-item.active .sn-label{color:var(--ink2);}
    @media(max-width:480px){.sn-label{display:none}.sn-bubble{width:24px;height:24px;font-size:10px}.sn-line{margin-top:11px}}
    .card{width:min(520px,100%);background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-t);padding:28px 28px 32px;position:relative;z-index:1;}
    @media(max-width:520px){.card{padding:20px 18px 28px;}}
    .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
    .back-btn{width:38px;height:38px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
    .back-btn:hover{border-color:var(--border-t);color:var(--teal);background:var(--teal-s);}
    h1{font-family:'DM Serif Display',serif;font-size:clamp(22px,4.5vw,27px);font-weight:400;margin:0 0 6px;color:#fff;}
    .subtitle{color:var(--ink2);margin:0 0 22px;font-size:14px;line-height:1.55;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:7px;letter-spacing:.08em;text-transform:uppercase;}
    input[type="text"],input[type="tel"]{width:100%;height:48px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);padding:0 14px;font-size:15px;color:#fff;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;}
    input::placeholder{color:var(--ink3);}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--ring);}
    input[aria-invalid="true"]{border-color:var(--danger);background:var(--danger-s);}
    .grid-2{display:grid;grid-template-columns:140px 1fr;gap:10px;}
    @media(max-width:420px){.grid-2{grid-template-columns:1fr;}}
    .prefix{display:flex;align-items:center;gap:10px;height:48px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);padding:0 14px;}
    .prefix img{width:22px;height:16px;border-radius:2px;object-fit:cover;}
    .prefix span{font-weight:700;font-size:15px;letter-spacing:.3px;color:var(--ink2);}
    .help{font-size:12px;color:var(--ink3);margin-top:5px;line-height:1.4;}
    .btn-row{display:flex;gap:10px;margin-top:20px;}
    .btn{min-height:50px;border-radius:999px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;flex:1;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}.btn:active:not(:disabled){transform:scale(.98);}
    .btn-primary{background:var(--teal);color:#fff;box-shadow:0 6px 22px var(--teal-g);}
    .btn-primary:hover:not(:disabled){background:var(--teal-d);box-shadow:0 10px 28px var(--teal-g);transform:translateY(-1px);}
    .btn-ghost{background:rgba(255,255,255,.05);color:var(--ink2);border:1px solid var(--border);}
    .btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.09);color:#fff;}
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--bg3);color:#fff;border:1px solid var(--border);padding:11px 22px;border-radius:999px;font-size:13.5px;font-weight:600;display:none;z-index:10000;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4);}
    .toast.show{display:block;animation:toastPop 2.4s ease both;}.toast.err{background:#7f1d1d;border-color:var(--danger);}
    @keyframes toastPop{0%{opacity:0;transform:translate(-50%,10px)}12%{opacity:1;transform:translate(-50%,0)}88%{opacity:1}100%{opacity:0;transform:translate(-50%,10px)}}
    @media(max-width:440px){.btn-row{flex-direction:column;}}
  </style>
</head>
<body>
  <a href="index.html" class="page-logo">Web<em>ey</em></a>
  <nav class="sn" aria-label="Kayıt adımları (7 adım)">
    <div class="sn-item done"><div class="sn-bubble"><i class="fa-solid fa-check"></i></div><span class="sn-label">Şifre</span></div>
    <div class="sn-line done"></div>
    <div class="sn-item active" aria-current="step"><div class="sn-bubble">2</div><span class="sn-label">Profil</span></div>
    <div class="sn-line"></div><div class="sn-item"><div class="sn-bubble">3</div><span class="sn-label">Adres</span></div>
    <div class="sn-line"></div><div class="sn-item"><div class="sn-bubble">4</div><span class="sn-label">Saatler</span></div>
    <div class="sn-line"></div><div class="sn-item"><div class="sn-bubble">5</div><span class="sn-label">Hizmetler</span></div>
    <div class="sn-line"></div><div class="sn-item"><div class="sn-bubble">6</div><span class="sn-label">Personel</span></div>
    <div class="sn-line"></div><div class="sn-item"><div class="sn-bubble">7</div><span class="sn-label">Bitiş</span></div>
  </nav>
  <main class="card" role="main">
    <div class="top">
      <button class="back-btn" id="btnBack" type="button" aria-label="Geri"><i class="fa-solid fa-arrow-left"></i></button>
    </div>
    <h1>Hakkınızda</h1>
    <p class="subtitle">Kendiniz ve işletmeniz hakkında bilgi verin.</p>
    <form id="aboutForm" autocomplete="off" novalidate>
      <div class="field">
        <label for="business">İşletme Adı</label>
        <input id="business" type="text" placeholder="Örn: X Kuaför" required inputmode="text" autocapitalize="words" autocomplete="organization" maxlength="80"/>
      </div>
      <div class="field">
        <label for="yourname">Salon Sahibi (Ad Soyad)</label>
        <input id="yourname" type="text" placeholder="Ad Soyad" required inputmode="text" autocapitalize="words" autocomplete="name" maxlength="80"/>
      </div>
      <div class="field">
        <div class="grid-2">
          <div>
            <label>Ülke Kodu</label>
            <div class="prefix"><img src="https://flagcdn.com/tr.svg" alt="TR"/><span>+90</span></div>
          </div>
          <div>
            <label for="phone">Telefon Numaranız</label>
            <input id="phone" type="tel" placeholder="5xx xxx xx xx" required inputmode="tel" autocomplete="tel-national" maxlength="14"/>
            <div class="help">Biçim: 5xx xxx xx xx</div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" type="button" id="btnBackForm"><i class="fa-solid fa-arrow-left"></i> Geri</button>
        <button class="btn btn-primary" type="submit" id="submitBtn"><span>Devam Et</span> <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </form>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
  const API_BASE=(window.API_BASE||"/api").replace(/\/+$/,"");
  const apiUrl=p=>API_BASE+(p.startsWith("/")?"":"/")+p;
  const K_FLOW="admin_onboarding_flow",K_EMAIL="pending_admin_email",K_METHOD="admin_onboarding_method",K_LAST="admin_onboarding_last_step",K_TOTAL="admin_onboarding_total",K_DATA="onboardingData";
  const TOTAL_STEPS=7;
  function stepToHref(n){const s=Math.max(1,Math.min(TOTAL_STEPS,Number(n)||1));if(s<=1)return"admin-register1.html";if(s===2)return"admin-register2.html";if(s===3)return"admin-register5.html";if(s===4)return"admin-register6.html";if(s===5)return"admin-register7.html";if(s===6)return"admin-register8.html";return"admin-register9.html";}
  function getOnboardingData(){try{return JSON.parse(localStorage.getItem(K_DATA)||"{}");}catch{return{};}}
  function patchOnboardingData(patch){const next={...getOnboardingData(),...patch};localStorage.setItem(K_DATA,JSON.stringify(next));return next;}
  const $=(s,r=document)=>r.querySelector(s);
  const toast=$("#toast");
  function showToast(msg,err=true){toast.textContent=msg;toast.className="toast show"+(err?" err":"");setTimeout(()=>toast.className="toast",2200);}
  function setLoading(btn,on=true,label="Kaydediliyor…"){if(!btn)return;btn.disabled=!!on;if(on){btn.dataset._label=btn.innerHTML;btn.innerHTML=`<i class="fa-solid fa-circle-notch fa-spin"></i> ${label}`;}else if(btn.dataset._label){btn.innerHTML=btn.dataset._label;delete btn.dataset._label;}}
  const t=v=>String(v||"").trim().replace(/\s+/g," ");
  function maskPhone(v){const d=(v||"").replace(/\D/g,"").slice(0,10);let o="";if(d.length>0)o+=d.substring(0,3);if(d.length>3)o+=" "+d.substring(3,6);if(d.length>6)o+=" "+d.substring(6,8);if(d.length>8)o+=" "+d.substring(8,10);return o;}
  const business=$("#business"),yourname=$("#yourname"),phone=$("#phone"),submitBtn=$("#submitBtn");
  phone.addEventListener("input",e=>e.target.value=maskPhone(e.target.value));
  (function prefill(){const about=getOnboardingData()?.about||{};if(about.businessName)business.value=about.businessName;if(about.adminName)yourname.value=about.adminName;if(about.adminPhone)phone.value=maskPhone(String(about.adminPhone));})();
  let DIRTY=false,allowLeave=false;
  [$("#aboutForm")].forEach(f=>f?.addEventListener("input",()=>DIRTY=true,{capture:true}));
  window.addEventListener("beforeunload",e=>{if(!allowLeave&&DIRTY){e.preventDefault();e.returnValue="";}});
  function goBack(){allowLeave=true;location.replace("admin-register1.html");}
  $("#btnBack").addEventListener("click",e=>{e.preventDefault();goBack();});
  $("#btnBackForm").addEventListener("click",e=>{e.preventDefault();goBack();});
  function validateFields(){const nameBusiness=t(business.value).slice(0,80),nameAdmin=t(yourname.value).slice(0,80),national=phone.value.replace(/\D/g,"");business.value=nameBusiness;yourname.value=nameAdmin;const phoneValid=/^5\d{9}$/.test(national);business.setAttribute("aria-invalid",String(!nameBusiness));yourname.setAttribute("aria-invalid",String(!nameAdmin));phone.setAttribute("aria-invalid",String(!phoneValid));if(!nameBusiness||!nameAdmin){showToast("Lütfen eksik alanları doldurun.");return{ok:false};}if(!phoneValid){showToast("Telefon numarası 5 ile başlayan 10 haneli olmalıdır.");return{ok:false};}return{ok:true,nameBusiness,nameAdmin,national};}
  function localGuard(){const flow=(localStorage.getItem(K_FLOW)||"").toLowerCase(),email=(localStorage.getItem(K_EMAIL)||"").trim(),method=(localStorage.getItem(K_METHOD)||"").toLowerCase(),last=Number(localStorage.getItem(K_LAST)||"0");if(flow!=="admin"||!email||!method){showToast("Akış geçersiz. Lütfen giriş yapın.",true);setTimeout(()=>location.replace("admin-register-login.html#login"),300);return false;}if(!localStorage.getItem(K_TOTAL))localStorage.setItem(K_TOTAL,String(TOTAL_STEPS));if(last<2){allowLeave=true;location.replace(stepToHref(1));return false;}if(last>2){allowLeave=true;location.replace(stepToHref(last));return false;}return true;}
  let IS_SUBMITTING=false;
  document.getElementById("aboutForm").addEventListener("submit",async(e)=>{
    e.preventDefault();if(IS_SUBMITTING)return;const v=validateFields();if(!v.ok)return;
    IS_SUBMITTING=true;setLoading(submitBtn,true);
    try{
      // ✅ SADECE localStoraga kaydet - DB'ye yazmıyoruz
      patchOnboardingData({about:{businessType:"kuafor",businessName:v.nameBusiness,adminName:v.nameAdmin,adminPhone:v.national}});
      localStorage.setItem(K_LAST,"3");allowLeave=true;DIRTY=false;
      location.replace("admin-register5.html");
    }catch(err){console.error("[step2]",err);showToast("Kaydedilemedi. Lütfen tekrar deneyin.");IS_SUBMITTING=false;setLoading(submitBtn,false);}
  });
  (function boot(){const ok=localGuard();if(ok)setTimeout(()=>business.focus(),80);})();
</script>
</body>
</html>
